<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Watched Movies</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="row">
        <h1>My Watched Movies</h1>
        <span id="count"></span>
      </div>
      <div class="row">
        <input id="search" type="search" placeholder="タイトルで検索…" />
        <select id="sort-key" aria-label="並び替え項目">
          <option value="year">公開年</option>
          <option value="title">タイトル</option>
        </select>
        <button id="sort-dir" type="button" aria-label="昇順/降順切替">↓</button>
      </div>
      <div class="row size-row">
        <label for="size">サイズ</label>
        <input id="size" type="range" min="90" max="280" step="5" value="150" />
      </div>
    </header>

    <main id="grid" class="grid" aria-live="polite"></main>

    <div id="modal" class="modal" hidden>
      <div class="modal-content" role="dialog" aria-modal="true">
        <button id="modal-close" aria-label="閉じる">×</button>
        <div class="modal-body"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
